<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Cancelled — Pristine Pair Cleaning and Care</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #3a5568 0%, #2d3748 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff; border-radius: 28px; padding: 56px 48px;
    max-width: 520px; width: 100%; text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.22);
    animation: popIn 0.4s ease both;
  }
  @keyframes popIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  .icon { font-size: 3.5rem; margin-bottom: 20px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; color: #1a2a38; margin-bottom: 12px; }
  p { font-size: 1rem; color: #3a5568; line-height: 1.7; margin-bottom: 28px; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .btn-primary {
    display: block; background: linear-gradient(135deg,#1a6fbf,#0d4f8c); color: white;
    text-decoration: none; padding: 16px; border-radius: 50px; font-weight: 800;
    font-size: 1rem; box-shadow: 0 4px 20px rgba(26,111,191,0.25); transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary {
    display: block; background: #eef4f8; color: #3a5568;
    text-decoration: none; padding: 16px; border-radius: 50px; font-weight: 700;
    font-size: 0.95rem; transition: all 0.2s;
  }
  .btn-secondary:hover { background: #d6eef8; color: #1a6fbf; }
  .logo { max-height: 65px; margin: 0 auto 24px; display: block; }
  @media (max-width: 520px) { .card { padding: 36px 24px; } }
</style>
</head>
<body>
<div class="card">
  <img src="/logo.jpg" alt="Pristine Pair" class="logo" onerror="this.style.display='none'">
  <div class="icon">🙁</div>
  <h1>Payment Cancelled</h1>
  <p>No worries — your payment was not processed and you haven't been charged. Your booking details are still saved. Ready to try again?</p>
  <div class="options">
    <a href="/#booking" class="btn-primary">↩ Return to Booking</a>
    <a href="tel:+15551234567" class="btn-secondary">📞 Call Us Instead — (555) 123-4567</a>
    <a href="/" class="btn-secondary">← Back to Home</a>
  </div>
</div>
</body>
</html>
